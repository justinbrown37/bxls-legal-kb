# Copy this file to "config.ini" and fill in your details.
# config.ini is gitignored so your password is never committed.

[gmail]
# Your full Gmail address.
email = justinbrown3586@gmail.com

# A Gmail "App Password" (NOT your normal password).
# Create one at: https://myaccount.google.com/apppasswords
# (Requires 2-Step Verification to be turned on.)
# Paste the 16 characters here; spaces are fine, they're stripped automatically.
app_password = xxxx xxxx xxxx xxxx

[settings]
# Where to save the downloaded PDFs. Leave blank to use the default
# (your Documents\HousingCasePackets folder on Windows).
# Example for Windows (note the double backslashes):
# output_dir = C:\\Users\\you\\Documents\\HousingCasePackets
output_dir =

# Mailbox to search and subject text to match. The defaults are almost
# always correct; leave them blank unless you know you need to change them.
mailbox =
subject =
